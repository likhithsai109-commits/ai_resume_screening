  <!-- Border Shimmer Effect -->
  <defs>
    <linearGradient id="borderShimmerLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(37,99,235,0);stop-opacity:0" />
      <stop offset="50%" style="stop-color:rgba(6,182,212,0.2);stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:rgba(16,185,129,0);stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1140" height="570" rx="12" fill="none" stroke="url(#borderShimmerLight)" stroke-width="1" opacity="0.5">
