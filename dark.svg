  <!-- Border Shimmer Effect -->
  <defs>
    <linearGradient id="borderShimmer" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(124,58,237,0);stop-opacity:0" />
      <stop offset="50%" style="stop-color:rgba(34,211,238,0.4);stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:rgba(16,185,129,0);stop-opacity:0" />
    </linearGradient>
  </defs>

  <rect x="20" y="20" width="1140" height="570" rx="12" fill="none" stroke="url(#borderShimmer)" stroke-width="1" opacity="0.6">
    <animateTransform
      attributeName="transform"
      type="translate"
      values="0,0; 50,50; 0,0"
      dur="6s"
      repeatCount="indefinite" />
  </rect>
</svg>